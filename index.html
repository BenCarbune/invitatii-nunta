<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog Invitați</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Marcellus&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fffdfb;
    --blush:#f6e3e1;
    --blush-deep:#e8b9b6;
    --rose-line:#e3c4c1;
    --ink:#3a2e2d;
    --ink-soft:#8a7674;
    --gold:#c9a35f;
    --confirmed:#9aab87;
    --declined:#c98a8a;
    --pending:#d8b96a;
    --couple:#a49abb;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 10%, rgba(246,227,225,0.55), transparent 45%),
      radial-gradient(circle at 90% 85%, rgba(246,227,225,0.45), transparent 50%),
      var(--paper);
    min-height:100vh;
    font-family:'Jost', sans-serif;
    color:var(--ink);
    padding:48px 20px 80px;
  }

  .wrap{ max-width:900px; margin:0 auto; }

  /* ================================================
     LOADER
  ================================================ */
  #loader{
    position:fixed;
    inset:0;
    z-index:999;
    background:
      radial-gradient(circle at 30% 25%, rgba(246,227,225,0.7), transparent 50%),
      radial-gradient(circle at 75% 75%, rgba(246,227,225,0.55), transparent 50%),
      var(--paper);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    transition: opacity 0.55s cubic-bezier(0.4,0,0.2,1),
                transform 0.55s cubic-bezier(0.4,0,0.2,1);
    will-change: opacity, transform;
  }
  #loader.done{
    opacity:0;
    transform:translateY(-14px);
    pointer-events:none;
  }

  .l-ornament{
    display:flex;
    align-items:center;
    margin-bottom:4px;
  }
  .l-line{
    display:block;
    width:56px;
    height:1px;
    background:var(--blush-deep);
  }
  .l-line-left{
    transform-origin:right center;
    animation: lineGrow 0.55s cubic-bezier(0.16,1,0.3,1) 0s both;
  }
  .l-line-right{
    transform-origin:left center;
    animation: lineGrow 0.55s cubic-bezier(0.16,1,0.3,1) 0s both;
  }
  .l-diamond{
    display:block;
    width:8px; height:8px;
    background:var(--blush-deep);
    transform:rotate(45deg) scale(0);
    margin:0 10px;
    animation: diamondPop 0.35s cubic-bezier(0.34,1.56,0.64,1) 0.35s both;
  }

  .l-title{
    font-family:'Marcellus', serif;
    font-size:clamp(44px,8vw,64px);
    color:var(--ink);
    letter-spacing:0.06em;
    margin:0;
    opacity:0;
    animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) 0.18s both;
  }
  .l-sub{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:17px;
    color:var(--ink-soft);
    margin:0;
    opacity:0;
    animation: fadeUp 0.45s ease 0.42s both;
  }
  .l-dots{
    display:inline-flex;
    gap:6px;
    margin-top:6px;
    opacity:0;
    animation: fadeUp 0.3s ease 0.65s both;
  }
  .l-dot{
    width:5px; height:5px;
    border-radius:50%;
    background:var(--blush-deep);
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .l-dot:nth-child(2){ animation-delay:0.2s; }
  .l-dot:nth-child(3){ animation-delay:0.4s; }

  /* ================================================
     LOADER KEYFRAMES
  ================================================ */
  @keyframes lineGrow{
    from{ transform:scaleX(0); }
    to{ transform:scaleX(1); }
  }
  @keyframes diamondPop{
    to{ transform:rotate(45deg) scale(1); }
  }
  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:none; }
  }
  @keyframes dotPulse{
    0%,100%{ opacity:0.3; transform:scale(0.8); }
    50%{ opacity:1; transform:scale(1); }
  }

  /* ================================================
     PAGE ENTRANCE (triggered by body.loaded)
  ================================================ */
  header, .stats, .add-card, .list-head, .guest-list{
    opacity:0;
  }
  body.loaded header{
    animation: sectionIn 0.55s cubic-bezier(0.16,1,0.3,1) 0.05s both;
  }
  body.loaded .stats{
    animation: sectionIn 0.55s cubic-bezier(0.16,1,0.3,1) 0.15s both;
  }
  body.loaded .add-card{
    animation: sectionIn 0.55s cubic-bezier(0.16,1,0.3,1) 0.25s both;
  }
  body.loaded .list-head{
    animation: sectionIn 0.45s cubic-bezier(0.16,1,0.3,1) 0.32s both;
  }
  body.loaded .guest-list{
    animation: sectionIn 0.45s cubic-bezier(0.16,1,0.3,1) 0.38s both;
  }

  @keyframes sectionIn{
    from{ opacity:0; transform:translateY(18px); }
    to{ opacity:1; transform:none; }
  }

  /* ================================================
     HEADER
  ================================================ */
  header{
    text-align:center;
    margin-bottom:40px;
    position:relative;
  }
  .eyebrow{
    font-family:'Jost', sans-serif;
    font-size:11px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:14px;
  }
  h1{
    font-family:'Marcellus', serif;
    font-weight:400;
    font-size:clamp(36px,6vw,56px);
    letter-spacing:0.02em;
    margin:0 0 10px;
    color:var(--ink);
  }
  .subtitle{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:19px;
    color:var(--ink-soft);
    margin:0;
  }
  .ornament{
    width:120px;
    height:14px;
    margin:22px auto 0;
    position:relative;
    animation: floatGently 5s ease-in-out infinite;
  }
  .ornament::before,.ornament::after{
    content:"";
    position:absolute;
    top:50%;
    width:42px;
    height:1px;
    background:var(--blush-deep);
  }
  .ornament::before{ left:0; }
  .ornament::after{ right:0; }
  .ornament span{
    position:absolute;
    left:50%; top:50%;
    transform:translate(-50%,-50%) rotate(45deg);
    width:7px; height:7px;
    background:var(--blush-deep);
  }

  @keyframes floatGently{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-4px); }
  }

  /* ================================================
     STATS
  ================================================ */
  .stats{
    display:flex;
    justify-content:center;
    gap:34px;
    margin-bottom:36px;
    flex-wrap:wrap;
  }
  .stat{ text-align:center; }
  .stat .num{
    font-family:'Marcellus', serif;
    font-size:26px;
    color:var(--ink);
    transition: color 0.3s ease;
    display:inline-block;
  }
  .stat .num.pop{
    animation: numPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .stat .lbl{
    font-size:10px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .stat.confirmed .num{ color:var(--confirmed); }
  .stat.pending .num{ color:var(--pending); }
  .stat.declined .num{ color:var(--declined); }
  .stat.persons .num{ color:var(--couple); }

  @keyframes numPop{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.25); }
    100%{ transform:scale(1); }
  }

  /* ================================================
     ADD CARD
  ================================================ */
  .add-card{
    background:var(--paper);
    border:1px solid var(--rose-line);
    border-radius:2px;
    padding:22px 24px;
    margin-bottom:36px;
    box-shadow:0 12px 30px -18px rgba(180,120,115,0.35);
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
    transition: box-shadow 0.25s ease;
  }
  .add-card:focus-within{
    box-shadow:0 16px 40px -18px rgba(180,120,115,0.45);
  }
  .add-card input[type=text]{
    flex:1;
    min-width:180px;
    border:none;
    border-bottom:1px solid var(--rose-line);
    background:transparent;
    font-family:'Cormorant Garamond', serif;
    font-size:19px;
    padding:8px 4px;
    color:var(--ink);
    outline:none;
    transition:border-color .2s;
  }
  .add-card input[type=text]:focus{ border-bottom-color:var(--gold); }
  .add-card input[type=text]::placeholder{ color:#c4b3b1; font-style:italic; }

  .seg{
    display:flex;
    border:1px solid var(--rose-line);
    border-radius:20px;
    overflow:hidden;
  }
  .seg button{
    border:none;
    background:transparent;
    padding:8px 14px;
    font-family:'Jost',sans-serif;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    cursor:pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .seg button.active[data-v="Confirmat"]{ background:var(--confirmed); color:#fff; }
  .seg button.active[data-v="Neconfirmat"]{ background:var(--pending); color:#fff; }
  .seg button.active[data-v="Refuzat"]{ background:var(--declined); color:#fff; }
  .type-seg button.active[data-t="Singur"]{ background:var(--ink-soft); color:#fff; }
  .type-seg button.active[data-t="Cuplu"]{ background:var(--couple); color:#fff; }

  .add-btn{
    border:1px solid var(--gold);
    background:var(--gold);
    color:#fff;
    font-family:'Jost',sans-serif;
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    padding:10px 20px;
    border-radius:20px;
    cursor:pointer;
    transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
    white-space:nowrap;
    position:relative;
    overflow:hidden;
  }
  .add-btn:hover{ background:#b8924d; box-shadow:0 4px 14px -4px rgba(201,163,95,0.5); }
  .add-btn:active{ transform:scale(0.96); }
  .add-btn:disabled{ opacity:.5; cursor:default; transform:none; }

  /* ================================================
     LIST
  ================================================ */
  .list-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:16px;
    padding:0 4px;
  }
  .list-head h2{
    font-family:'Marcellus',serif;
    font-weight:400;
    font-size:20px;
    margin:0;
    letter-spacing:0.02em;
  }
  .count-pill{
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:0.05em;
    transition: opacity 0.3s ease;
  }

  .guest-list{
    background:var(--paper);
    border:1px solid var(--rose-line);
    border-radius:2px;
    box-shadow:0 16px 40px -24px rgba(180,120,115,0.4);
    overflow:hidden;
  }

  /* ================================================
     GUEST ROWS
  ================================================ */
  .guest-row{
    display:flex;
    align-items:center;
    gap:16px;
    padding:16px 22px;
    border-bottom:1px solid #f1e6e5;
    transition: background 0.15s ease;
    will-change: transform, opacity;
  }
  .guest-row:last-child{ border-bottom:none; }
  .guest-row:hover{ background:#fdf8f7; }

  /* Enter animation */
  .guest-row.row-enter{
    animation: rowIn 0.38s cubic-bezier(0.16,1,0.3,1) var(--row-delay, 0ms) both;
  }

  /* Exit animation */
  .guest-row.row-exit{
    animation: rowOut 0.28s ease-in forwards;
    overflow:hidden;
    pointer-events:none;
  }

  @keyframes rowIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:none; }
  }
  @keyframes rowOut{
    from{ opacity:1; transform:translateX(0); max-height:80px; padding-top:16px; padding-bottom:16px; }
    to{ opacity:0; transform:translateX(20px); max-height:0; padding-top:0; padding-bottom:0; }
  }

  .guest-name{
    flex:1;
    font-family:'Cormorant Garamond', serif;
    font-size:21px;
    color:var(--ink);
    transition: color 0.15s;
  }
  .guest-name[contenteditable]:focus{
    outline:none;
    border-bottom:1px dashed var(--gold);
  }

  .type-badge{
    font-size:10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:5px 12px;
    border-radius:20px;
    cursor:pointer;
    white-space:nowrap;
    font-family:'Jost',sans-serif;
    border:1px solid transparent;
    transition: background 0.2s ease, color 0.2s ease, transform 0.1s ease;
  }
  .type-badge:active{ transform:scale(0.93); }
  .type-badge.Singur{ background:#f2efed; color:var(--ink-soft); border-color:#e0d6d4; }
  .type-badge.Cuplu{ background:#eeebf5; color:var(--couple); border-color:#d8d1ea; }

  .status-badge{
    font-size:10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:6px 14px;
    border-radius:20px;
    cursor:pointer;
    border:1px solid transparent;
    white-space:nowrap;
    font-family:'Jost',sans-serif;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, transform 0.1s ease;
  }
  .status-badge:active{ transform:scale(0.93); }
  .status-badge.Confirmat{ background:#eef3ea; color:var(--confirmed); border-color:#d3e0ca; }
  .status-badge.Neconfirmat{ background:#faf2e0; color:#b3893a; border-color:#ecd8a8; }
  .status-badge.Refuzat{ background:#f7eaea; color:var(--declined); border-color:#edd2d2; }

  .del-btn{
    width:26px; height:26px;
    border:none;
    background:transparent;
    color:#d4b8b6;
    font-size:18px;
    line-height:1;
    cursor:pointer;
    border-radius:50%;
    transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
  }
  .del-btn:hover{ background:#f7eaea; color:var(--declined); }
  .del-btn:active{ transform:scale(0.88); }

  /* ================================================
     EMPTY / LOADING STATES
  ================================================ */
  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    animation: fadeUp 0.4s ease both;
  }
  .empty-state .glyph{
    font-family:'Marcellus',serif;
    font-size:32px;
    color:var(--blush-deep);
    margin-bottom:10px;
  }
  .empty-state p{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:18px;
    margin:0;
  }

  .loading-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:18px;
  }

  /* ================================================
     FOOTER
  ================================================ */
  footer{
    text-align:center;
    margin-top:40px;
    font-size:11px;
    color:#c4b3b1;
    letter-spacing:0.1em;
  }

  /* ================================================
     RESPONSIVE
  ================================================ */
  @media(max-width:560px){
    .add-card{ flex-direction:column; align-items:stretch; }
    .seg{ justify-content:center; }
    .guest-row{ flex-wrap:wrap; }
  }

  /* ================================================
     REDUCED MOTION
  ================================================ */
  @media (prefers-reduced-motion: reduce){
    #loader{ transition:none; }
    .l-line-left,.l-line-right,.l-diamond,.l-title,.l-sub,.l-dots{
      animation:none; opacity:1; transform:none;
    }
    header,.stats,.add-card,.list-head,.guest-list{
      animation:none !important; opacity:1 !important; transform:none !important;
    }
    .guest-row.row-enter,.guest-row.row-exit{ animation:none !important; }
    .ornament{ animation:none; }
    .stat .num.pop{ animation:none; }
  }
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loader" role="status" aria-label="Se încarcă...">
  <div class="l-ornament">
    <span class="l-line l-line-left"></span>
    <span class="l-diamond"></span>
    <span class="l-line l-line-right"></span>
  </div>
  <p class="l-title">D. &amp; B.</p>
  <p class="l-sub">se pregătește lista…</p>
  <div class="l-dots">
    <span class="l-dot"></span>
    <span class="l-dot"></span>
    <span class="l-dot"></span>
  </div>
</div>

<div class="wrap">
  <header>
    <div class="eyebrow">Cu drag, pentru ziua noastră</div>
    <h1>Lista Invitaților</h1>
    <p class="subtitle">fiecare nume, un loc la masă noastră</p>
    <div class="ornament"><span></span></div>
  </header>

  <div class="stats">
    <div class="stat"><div class="num" id="statTotal">—</div><div class="lbl">Invitații</div></div>
    <div class="stat persons"><div class="num" id="statPersons">—</div><div class="lbl">Persoane</div></div>
    <div class="stat confirmed"><div class="num" id="statConf">—</div><div class="lbl">Confirmați</div></div>
    <div class="stat pending"><div class="num" id="statPend">—</div><div class="lbl">În așteptare</div></div>
    <div class="stat declined"><div class="num" id="statDecl">—</div><div class="lbl">Refuzat</div></div>
  </div>

  <div class="add-card">
    <input type="text" id="nameInput" placeholder="Numele invitatului…" />
    <div class="seg type-seg" id="typeSeg">
      <button data-t="Singur" class="active">singur</button>
      <button data-t="Cuplu">cuplu</button>
    </div>
    <div class="seg" id="statusSeg">
      <button data-v="Neconfirmat" class="active">neconfirmat</button>
      <button data-v="Confirmat">confirmat</button>
      <button data-v="Refuzat">refuzat</button>
    </div>
    <button class="add-btn" id="addBtn">+ Adaugă</button>
  </div>

  <div class="list-head">
    <h2>Invitați</h2>
    <span class="count-pill" id="listCount"></span>
  </div>

  <div class="guest-list" id="guestList">
    <div class="loading-state">Se încarcă lista…</div>
  </div>

  <footer>D. &amp; B. · catalog personal de nuntă</footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* ── Firebase ── */
firebase.initializeApp({
  apiKey: "AIzaSyCkNjLOjPDzhQJYnx3PpeO3WNvHCHnCDbQ",
  authDomain: "invitatii-973bf.firebaseapp.com",
  projectId: "invitatii-973bf",
  storageBucket: "invitatii-973bf.firebasestorage.app",
  messagingSenderId: "668840687838",
  appId: "1:668840687838:web:b0c82e3426217a7d146a4f",
  measurementId: "G-7MM78DX54T"
});
const db = firebase.firestore();
const col = db.collection('guests');

/* ── State ── */
let guests = [];
let newStatus = 'Neconfirmat';
let newType = 'Singur';
let firstRender = true;
const animatedIds = new Set();
const deletingIds = new Set();

/* ── DOM refs ── */
const listEl   = document.getElementById('guestList');
const nameInput = document.getElementById('nameInput');
const addBtn   = document.getElementById('addBtn');
const seg      = document.getElementById('statusSeg');
const typeSeg  = document.getElementById('typeSeg');
const loader   = document.getElementById('loader');

/* ── Loader: show for at least 1 s, then reveal page ── */
let dataReady = false;
let timerDone = false;

function tryReveal(){
  if(!dataReady || !timerDone) return;
  loader.classList.add('done');
  document.body.classList.add('loaded');
}
setTimeout(()=>{ timerDone = true; tryReveal(); }, 1000);

/* ── Toggles ── */
typeSeg.addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  [...typeSeg.children].forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  newType = btn.dataset.t;
});

seg.addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  [...seg.children].forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  newStatus = btn.dataset.v;
});

/* ── Add guest ── */
addBtn.addEventListener('click', addGuest);
nameInput.addEventListener('keydown', e=>{ if(e.key==='Enter') addGuest(); });

function addGuest(){
  const name = nameInput.value.trim();
  if(!name) return;
  addBtn.disabled = true;
  col.add({
    name,
    status: newStatus,
    type: newType,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(()=>{
    nameInput.value = '';
    nameInput.focus();
    addBtn.disabled = false;
  }).catch(()=>{ addBtn.disabled = false; });
}

/* ── Delete with exit animation ── */
function deleteGuest(id){
  deletingIds.add(id);
  const row = listEl.querySelector(`.guest-row[data-id="${id}"]`);
  if(row){
    row.classList.add('row-exit');
    setTimeout(()=>{
      col.doc(id).delete().then(()=>deletingIds.delete(id));
    }, 300);
  } else {
    col.doc(id).delete();
  }
}

/* ── Helpers ── */
function cycleStatus(s){ return s==='Neconfirmat'?'Confirmat':s==='Confirmat'?'Refuzat':'Neconfirmat'; }
function cycleType(t){ return t==='Singur'?'Cuplu':'Singur'; }
function personCount(g){ return g.type==='Cuplu'?2:1; }

/* ── Animated counter ── */
const prevVals = {};
function animateStat(id, to){
  const el = document.getElementById(id);
  const from = prevVals[id] ?? to;
  prevVals[id] = to;
  if(from === to){ el.textContent = to; return; }
  /* pop the element */
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  el.addEventListener('animationend', ()=>el.classList.remove('pop'), { once:true });
  /* count up/down */
  const dur = 380;
  const start = performance.now();
  const diff = to - from;
  function step(now){
    const t = Math.min((now - start) / dur, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(from + diff * ease);
    if(t < 1) requestAnimationFrame(step);
    else el.textContent = to;
  }
  requestAnimationFrame(step);
}

/* ── Firestore real-time listener ── */
col.orderBy('createdAt').onSnapshot(snapshot=>{
  guests = snapshot.docs.map(doc=>({ id: doc.id, ...doc.data() }));
  if(!dataReady){ dataReady = true; tryReveal(); }
  render();
});

/* ── Render ── */
function render(){
  const visible = guests.filter(g=>!deletingIds.has(g.id));
  const total   = visible.length;
  const persons = visible.reduce((s,g)=>s+personCount(g), 0);

  animateStat('statTotal',   total);
  animateStat('statPersons', persons);
  animateStat('statConf',    visible.filter(g=>g.status==='Confirmat').length);
  animateStat('statPend',    visible.filter(g=>g.status==='Neconfirmat').length);
  animateStat('statDecl',    visible.filter(g=>g.status==='Refuzat').length);

  const countEl = document.getElementById('listCount');
  countEl.textContent = total + (total===1?' invitat':' invitați') + ' · ' + persons + ' persoane';

  if(visible.length===0){
    listEl.innerHTML = `<div class="empty-state"><div class="glyph">∗</div><p>Niciun invitat încă. Adaugă primul nume mai sus.</p></div>`;
    firstRender = false;
    return;
  }

  const isInitialBatch = firstRender;
  listEl.innerHTML = visible.map((g, i)=>{
    const isNew = !animatedIds.has(g.id);
    const delay = isNew && isInitialBatch ? i * 55 : 0;
    return `
    <div class="guest-row row-enter" data-id="${g.id}" style="--row-delay:${delay}ms">
      <div class="guest-name" contenteditable="true" data-id="${g.id}">${escapeHtml(g.name)}</div>
      <div class="type-badge ${g.type}" data-id="${g.id}">${g.type==='Cuplu'?'♡ Cuplu':'Singur'}</div>
      <div class="status-badge ${g.status}" data-id="${g.id}">${g.status}</div>
      <button class="del-btn" data-id="${g.id}" title="Șterge">×</button>
    </div>`;
  }).join('');

  visible.forEach(g=>animatedIds.add(g.id));
  firstRender = false;

  /* Event delegation for type badge */
  listEl.querySelectorAll('.type-badge').forEach(el=>{
    el.addEventListener('click', ()=>{
      const g = guests.find(x=>x.id===el.dataset.id);
      if(g) col.doc(g.id).update({ type: cycleType(g.type) });
    });
  });

  /* Event delegation for status badge */
  listEl.querySelectorAll('.status-badge').forEach(el=>{
    el.addEventListener('click', ()=>{
      const g = guests.find(x=>x.id===el.dataset.id);
      if(g) col.doc(g.id).update({ status: cycleStatus(g.status) });
    });
  });

  /* Delete */
  listEl.querySelectorAll('.del-btn').forEach(el=>{
    el.addEventListener('click', ()=>deleteGuest(el.dataset.id));
  });

  /* Inline name edit */
  listEl.querySelectorAll('.guest-name').forEach(el=>{
    el.addEventListener('blur', ()=>{
      const g = guests.find(x=>x.id===el.dataset.id);
      if(!g) return;
      const txt = el.textContent.trim();
      if(txt && txt!==g.name) col.doc(g.id).update({ name: txt });
      else el.textContent = g.name;
    });
    el.addEventListener('keydown', e=>{
      if(e.key==='Enter'){ e.preventDefault(); el.blur(); }
    });
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>
